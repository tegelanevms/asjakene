<!DOCTYPE html>
<html>
  <head>
    <title>Video</title>
	<script>
	  let player=null, c=null, g=null, g2=null;
	  function start(){
	   player=document.getElementById("v1");
	   c=document.getElementById("c1")
	   g=c.getContext("2d");
	   g2=document.getElementById("c2").getContext("2d");
	   span1=document.getElementById("s1");
	   navigator.mediaDevices.getUserMedia({video:true}).then((stream) => {
         player.srcObject = stream;
       });
	   setInterval(capture, 1000);
	  }
	  function capture(){
	     g.drawImage(player, 0, 0, c.width, c.height);
		 g.strokeRect(80, 35, 44, 44);
		 let d=g.getImageData(85, 40, 42, 42);
		 g2.putImageData(d, 0, 0);
		 s1.innerHTML=d.data.slice(0,4);
         if (Math.abs(parseInt(d.data.slice(0)) - parseInt(d.data.slice(1))) < 25 && parseInt(d.data.slice(2)) < 100) {
            s2.innerHTML = "Bello!"
         } else if (Math.abs(parseInt(d.data.slice(1)) - parseInt(d.data.slice(2))) < 25 && parseInt(d.data.slice(0)) < 100) {
            s2.innerHTML = "Agua"
         } else if (Math.abs(parseInt(d.data.slice(0)) - parseInt(d.data.slice(2))) < 60 && parseInt(d.data.slice(1)) < 100) {
            s2.innerHTML = "Majenta"
         } else if (d.data.slice(0, 3).indexOf(Math.max(...d.data.slice(0, 3).map(Number))) == 0) {
            s2.innerHTML = "Rer"
         } else if (d.data.slice(0, 3).indexOf(Math.max(...d.data.slice(0, 3).map(Number))) == 1) {
            s2.innerHTML = "Greer"
         } else if (d.data.slice(0, 3).indexOf(Math.max(...d.data.slice(0, 3).map(Number))) == 2) {
            s2.innerHTML = "Bluh"
         }
	  }
	</script>
  </head>
  <body onload="start()">
    <video id="v1" controls autoplay style="width: 45%"></video>
	<canvas id="c1" width="320" height="240" style="width: 45%"/></canvas><br />	 
	<canvas id="c2" width="40" height="40"/></canvas>	
    <span id="s1"></span> <br>
    <span id="s2" style="font-size: 100px;"></span>	
  </body>
</html>
